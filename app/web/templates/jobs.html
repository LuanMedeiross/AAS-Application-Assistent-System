{% extends "base.html" %}
{% block title %}Vagas — Application Assistant{% endblock %}
{% block content %}
<div class="panel">
  <form hx-post="/jobs/search" hx-target="#joblist" hx-swap="innerHTML"
        hx-indicator="#search-spin" hx-disabled-elt="find button"
        style="display:flex; gap:8px; align-items:center; flex-wrap:wrap">
    <input name="keywords" value="{{ default_keywords }}"
           placeholder="palavras-chave separadas por vírgula (ex.: pentest, appsec)"
           style="flex:1; min-width:240px">
    <button type="submit">Buscar vagas</button>
    <span id="search-spin" class="htmx-indicator hint">⏳ descobrindo + ranqueando… (pode levar alguns minutos)</span>
  </form>
</div>

<div class="panel">
  <form hx-post="/jobs/tailor-all" hx-target="#joblist" hx-swap="innerHTML"
        hx-indicator="#batch-spin" hx-disabled-elt="find button"
        hx-confirm="Gerar CV para todas as vagas sem CV com score ≥ o mínimo? Pode demorar (uma chamada de IA por vaga)."
        style="display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin:0">
    <span class="hint">Gerar CV em lote — score mínimo</span>
    <input type="number" name="min_score" value="30" min="0" max="100" style="width:72px">
    <button type="submit">Gerar p/ todas sem CV</button>
    <span id="batch-spin" class="htmx-indicator hint">⏳ gerando em lote… (pode demorar bastante)</span>
  </form>
</div>

<div id="joblist">{% include "_job_list.html" %}</div>
{% endblock %}
